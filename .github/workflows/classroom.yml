name: Autograde Search Algorithms

on: [push, workflow_dispatch]

jobs:
  grade:
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: read
      statuses: write
      checks: write

    steps:
      - name: Checkout student submission
        uses: actions/checkout@v4

      - name: Checkout hidden tests
        uses: actions/checkout@v4
        with:
          repository: sst-cs/ai-assignment-2-tests
          token: ${{ secrets.HIDDEN_TESTS_TOKEN }}
          path: hidden-tests

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pytest

      - name: BFS Tests
        id: bfs
        uses: education/autograding-command-grader@v1
        continue-on-error: true
        with:
          test-name: 'bfs'
          command: 'pytest hidden-tests/tests/test_search.py -k "bfs"'
          timeout: 10
          max-score: 2

      - name: DFS Tests
        id: dfs
        uses: education/autograding-command-grader@v1
        continue-on-error: true
        with:
          test-name: 'dfs'
          command: 'pytest hidden-tests/tests/test_search.py -k "dfs"'
          timeout: 10
          max-score: 2

      - name: UCS Tests
        id: ucs
        uses: education/autograding-command-grader@v1
        continue-on-error: true
        with:
          test-name: 'ucs'
          command: 'pytest hidden-tests/tests/test_search.py -k "ucs"'
          timeout: 10
          max-score: 3

      - name: A-Star Tests
        id: a_star
        uses: education/autograding-command-grader@v1
        continue-on-error: true
        with:
          test-name: 'a_star'
          command: 'pytest hidden-tests/tests/test_search.py -k "a_star"'
          timeout: 10
          max-score: 3

      - name: Package Results
        id: package
        run: |
          BFS_JSON=$(echo "${{steps.bfs.outputs.result}}" | base64 -d 2>/dev/null || echo '{"score":0}')
          DFS_JSON=$(echo "${{steps.dfs.outputs.result}}" | base64 -d 2>/dev/null || echo '{"score":0}')
          UCS_JSON=$(echo "${{steps.ucs.outputs.result}}" | base64 -d 2>/dev/null || echo '{"score":0}')
          ASTAR_JSON=$(echo "${{steps.a_star.outputs.result}}" | base64 -d 2>/dev/null || echo '{"score":0}')
          
          BFS_SCORE=$(echo "$BFS_JSON" | jq '.tests[0].score // .score // 0')
          DFS_SCORE=$(echo "$DFS_JSON" | jq '.tests[0].score // .score // 0')
          UCS_SCORE=$(echo "$UCS_JSON" | jq '.tests[0].score // .score // 0')
          ASTAR_SCORE=$(echo "$ASTAR_JSON" | jq '.tests[0].score // .score // 0')
          
          TOTAL=$((BFS_SCORE + DFS_SCORE + UCS_SCORE + ASTAR_SCORE))
          echo "Calculated Total Score: $TOTAL"
          
          # Generate 10 virtual runners to represent partial credit (1 point each)
          for i in $(seq 1 10); do
            STATUS="fail"
            SCORE=0
            if [ $i -le $TOTAL ]; then STATUS="pass"; SCORE=1; fi
            JSON="{\"version\":1,\"status\":\"$STATUS\",\"max_score\":1, \"tests\":[{\"name\":\"Requirement $i\",\"status\":\"$STATUS\",\"score\":$SCORE,\"max_score\":1}]}"
            B64=$(echo -n "$JSON" | base64 -w 0)
            echo "R${i}_RESULTS=$B64" >> $GITHUB_ENV
          done

      - name: Autograding Reporter
        uses: education/autograding-grading-reporter@v1
        continue-on-error: true
        with:
          runners: r1,r2,r3,r4,r5,r6,r7,r8,r9,r10
