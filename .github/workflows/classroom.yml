name: Autograde Search Algorithms

on: [push, workflow_dispatch]

jobs:
  grade:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout student submission
        uses: actions/checkout@v4

      - name: Checkout hidden tests
        uses: actions/checkout@v4
        with:
          repository: sst-cs/ai-assignment-2-tests
          token: ${{ secrets.HIDDEN_TESTS_TOKEN }}
          path: hidden-tests

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pytest

      - name: BFS Tests
        id: bfs
        uses: education/autograding-command-grader@v1
        with:
          test-name: 'bfs'
          command: 'pytest hidden-tests/tests/test_search.py -k "bfs"'
          timeout: 10
          max-score: 2

      - name: DFS Tests
        id: dfs
        uses: education/autograding-command-grader@v1
        with:
          test-name: 'dfs'
          command: 'pytest hidden-tests/tests/test_search.py -k "dfs"'
          timeout: 10
          max-score: 2

      - name: UCS Tests
        id: ucs
        uses: education/autograding-command-grader@v1
        with:
          test-name: 'ucs'
          command: 'pytest hidden-tests/tests/test_search.py -k "ucs"'
          timeout: 10
          max-score: 3

      - name: A-Star Tests
        id: a_star
        uses: education/autograding-command-grader@v1
        with:
          test-name: 'a_star'
          command: 'pytest hidden-tests/tests/test_search.py -k "a_star"'
          timeout: 10
          max-score: 3

      - name: Autograding Reporter
        uses: classroom-resources/autograding-reporter@v1
        env:
          BFS_RESULTS: "${{steps.bfs.outputs.result}}"
          DFS_RESULTS: "${{steps.dfs.outputs.result}}"
          UCS_RESULTS: "${{steps.ucs.outputs.result}}"
          A_STAR_RESULTS: "${{steps.a_star.outputs.result}}"
        with:
          runners: bfs,dfs,ucs,a_star
